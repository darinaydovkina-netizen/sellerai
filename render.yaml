services:
  - type: web
    name: sellerai-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /docs
    rootDir: sellerai/backend

  - type: static
    name: sellerai-frontend
    runtime: static
    region: frankfurt
    buildCommand: ''
    staticPublishPath: sellerai
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sellerai-backend
          property: host
